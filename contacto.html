<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian | Contacto</title>
    <style>
    /* Estilo general del cuerpo */
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    text-align: center; 
    background-color: #f0f2f5; 
    padding: 50px; 
}

/* Estilo del contenedor del menú */
nav { 
    margin-bottom: 40px; 
}

/* Transformar los enlaces en BOTONES */
nav a { 
    background-color: #007bff; /* Color azul */
    color: white;              /* Texto blanco */
    padding: 12px 25px;        /* Tamaño del botón (alto y ancho) */
    text-decoration: none;     /* Quitar el subrayado feo */
    border-radius: 8px;        /* Bordes redondeados */
    font-size: 18px;           /* Texto más grande */
    font-weight: bold;
    margin: 0 10px;            /* Espacio entre botones */
    display: inline-block;     /* Para que respeten el tamaño */
    transition: background 0.3s; /* Efecto suave al pasar el mouse */
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

/* Efecto cuando pasas el mouse por encima */
nav a:hover { 
    background-color: #0056b3; /* Un azul más oscuro */
    transform: translateY(-2px); /* El botón "salta" un poquito */
}

/* Tu tarjeta blanca */
.card { 
    background: white; 
    padding: 40px; 
    border-radius: 15px; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    display: inline-block; 
}
    </style>
</head>
<body>
    <nav>
    <a href="index.html">Inicio</a>
    <a href="proyectos.html">Proyectos</a>
    <a href="contacto.html">Contacto</a>
</nav>

    <div class="card">
        <h1>¡Hablemos!</h1>
        <p>Si quieres contactarme para trabajar juntos o saludar, puedes hacerlo aquí:</p>
        <hr>
        <a href="mailto:tuemail@ejemplo.com" class="boton-contacto">📧 Enviar Email</a>
        <a href="https://linkedin.com" target="_blank" class="boton-contacto">🔗 LinkedIn</a>
    </div>

</body>
</html>
